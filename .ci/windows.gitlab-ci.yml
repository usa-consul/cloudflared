# Windows build and test pipeline for cloudflared
# Handles compilation, testing, and artifact generation on Windows runners

.windows-defaults: &windows-defaults
  tags:
    - windows
  before_script:
    - $env:GOPATH = "$env:CI_PROJECT_DIR\.go"
    - $env:PATH = "$env:GOPATH\bin;$env:PATH"
    - $env:CGO_ENABLED = "0"
    - go version
    - go env

# Build stage for Windows amd64
build-windows-amd64:
  <<: *windows-defaults
  stage: build
  variables:
    GOOS: windows
    GOARCH: amd64
  script:
    - go build -v -ldflags "-X 'main.Version=$env:VERSION'" -o cloudflared-windows-amd64.exe ./cmd/cloudflared
  artifacts:
    name: cloudflared-windows-amd64
    paths:
      - cloudflared-windows-amd64.exe
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Build stage for Windows 386
build-windows-386:
  <<: *windows-defaults
  stage: build
  variables:
    GOOS: windows
    GOARCH: "386"
  script:
    - go build -v -ldflags "-X 'main.Version=$env:VERSION'" -o cloudflared-windows-386.exe ./cmd/cloudflared
  artifacts:
    name: cloudflared-windows-386
    paths:
      - cloudflared-windows-386.exe
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Run unit tests on Windows
test-windows:
  <<: *windows-defaults
  stage: test
  variables:
    GOOS: windows
    GOARCH: amd64
  script:
    - go test -v -count=1 -race -timeout 5m ./...
  artifacts:
    when: always
    reports:
      junit: test-results.xml
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Sign and package Windows MSI installer
package-windows-msi:
  <<: *windows-defaults
  stage: package
  needs:
    - build-windows-amd64
  script:
    - Write-Host "Packaging MSI for version $env:VERSION"
    - |
      if (-not (Test-Path "cloudflared-windows-amd64.exe")) {
        Write-Error "Binary not found"
        exit 1
      }
    # WiX toolset packaging step (requires WiX to be installed on runner)
    - >-
      & "$env:WIX\bin\candle.exe"
      -dVersion="$env:VERSION"
      -dBinaryPath="cloudflared-windows-amd64.exe"
      packaging/cloudflared.wxs
      -o cloudflared.wixobj
    - >-
      & "$env:WIX\bin\light.exe"
      cloudflared.wixobj
      -o cloudflared-windows-amd64.msi
  artifacts:
    name: cloudflared-windows-msi
    paths:
      - cloudflared-windows-amd64.msi
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$PUBLISH_RELEASE == "true"'
