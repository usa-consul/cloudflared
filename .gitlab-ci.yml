# Main GitLab CI/CD configuration for cloudflared
# Orchestrates all platform-specific build and test pipelines

default:
  tags:
    - linux

variables:
  GO_VERSION: "1.21"
  BINARY_NAME: "cloudflared"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

stages:
  - build-image
  - build
  - test
  - package
  - publish

# Include platform-specific CI configurations
include:
  - local: .ci/commons.gitlab-ci.yml
  - local: .ci/ci-image.gitlab-ci.yml
  - local: .ci/linux.gitlab-ci.yml
  - local: .ci/mac.gitlab-ci.yml
  - local: .ci/windows.gitlab-ci.yml
  - local: .ci/apt-internal.gitlab-ci.yml
  - local: .ci/github.gitlab-ci.yml

# Workflow rules to control when pipelines run
workflow:
  rules:
    # Run on merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on main/master branch pushes
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Run on version tags
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+/
    # Run on release branches
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
    # Allow manual pipeline triggers
    - if: $CI_PIPELINE_SOURCE == "web"
